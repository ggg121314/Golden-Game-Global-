<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGG QUAD-CARD ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        body {
            background: radial-gradient(circle at center, #0d1b2a 0%, #000814 100%);
            font-family: 'Rajdhani', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* Sound Overlay */
        #soundOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }

        /* Card Styling - Vertical Focus */
        .card-container { perspective: 1000px; width: 100%; height: 120px; margin-bottom: 12px; }
        .card {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card.revealed { transform: rotateX(180deg); }
        
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-front {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            transform: rotateX(180deg);
        }

        .card-back {
            background: linear-gradient(45deg, #1e3a8a, #3b82f6);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            border: 2px solid rgba(59, 130, 246, 0.5);
        }

        .card-back::after {
            content: "GGG"; font-family: 'Orbitron'; font-size: 1.5rem; font-weight: bold; opacity: 0.3;
        }
        
        .selected-card { 
            border: 3px solid #22c55e !important; 
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.6);
            transform: scale(1.02);
        }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.08); }
        
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .active-win { animation: pulse-green 2s infinite; }
    </style>
</head>
<body class="p-4">

    <div id="soundOverlay">
        <div class="text-center animate-bounce mb-8">
            <h1 class="orbitron text-4xl font-bold text-blue-500 tracking-tighter">GGG</h1>
            <p class="text-blue-300 tracking-[0.3em] text-xs">QUAD-CARD LEGACY</p>
        </div>
        <button onclick="enableAudio()" class="orbitron bg-blue-600 hover:bg-blue-500 px-10 py-5 rounded-full font-bold text-xl shadow-[0_0_30px_#2563eb] transition-all active:scale-90">
            ENTER GAME
        </button>
        <p class="mt-6 text-gray-500 text-sm italic">Tap to sync audio & assets</p>
    </div>

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="orbitron text-xl font-bold text-blue-400">GGG QUAD-CARD</h1>
            <p class="text-[10px] text-gray-500">PROVABLY FAIR GAMING</p>
        </div>
        <div id="ton-connect"></div>
    </div>

    <div class="max-w-md mx-auto">
        <div class="grid grid-cols-1 gap-4 mb-6">
            <div class="glass p-4 rounded-2xl flex justify-between items-center active-win">
                <div>
                    <p class="text-xs text-gray-400 font-bold uppercase">Pending Wins</p>
                    <p class="text-2xl font-bold text-green-400 orbitron" id="pending-win">0.00 TON</p>
                </div>
                <button class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-xs font-bold transition-colors">WITHDRAW</button>
            </div>

            <div class="glass p-4 rounded-2xl flex justify-between items-center">
                <div>
                    <p class="text-xs text-gray-400 font-bold uppercase">Referral Rewards</p>
                    <p class="text-2xl font-bold text-green-400 orbitron" id="ref-balance">0.00 TON</p>
                </div>
                <button class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-xs font-bold transition-colors">WITHDRAW</button>
            </div>
        </div>

        <div class="mb-6" id="cardGrid">
            <div class="card-container" onclick="selectCard(1)">
                <div class="card" id="card1">
                    <div class="card-face card-back" id="back1"></div>
                    <div class="card-face card-front orbitron text-4xl text-yellow-500 font-black" id="res1">?</div>
                </div>
            </div>
            <div class="card-container" onclick="selectCard(2)">
                <div class="card" id="card2">
                    <div class="card-face card-back" id="back2"></div>
                    <div class="card-face card-front orbitron text-4xl text-yellow-500 font-black" id="res2">?</div>
                </div>
            </div>
            <div class="card-container" onclick="selectCard(3)">
                <div class="card" id="card3">
                    <div class="card-face card-back" id="back3"></div>
                    <div class="card-face card-front orbitron text-4xl text-yellow-500 font-black" id="res3">?</div>
                </div>
            </div>
            <div class="card-container" onclick="selectCard(4)">
                <div class="card" id="card4">
                    <div class="card-face card-back" id="back4"></div>
                    <div class="card-face card-front orbitron text-4xl text-yellow-500 font-black" id="res4">?</div>
                </div>
            </div>
        </div>

        <div class="glass p-6 rounded-3xl mb-8">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <span class="text-xs font-bold text-gray-400 block mb-1 uppercase">Your Bet</span>
                    <span class="text-2xl font-bold text-blue-400 orbitron" id="betDisplay">0.10 TON</span>
                </div>
                <div class="text-right">
                    <span class="text-xs font-bold text-gray-400 block mb-1 uppercase">Potential Win (3.3x)</span>
                    <span class="text-2xl font-bold text-yellow-500 orbitron" id="winDisplay">0.33 TON</span>
                </div>
            </div>

            <input type="range" min="0.1" max="3.0" step="0.1" value="0.1" class="w-full mb-8 h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-500" id="betRange" oninput="updateBet(this.value)">
            
            <div id="timerDisplay" class="text-center text-yellow-500 font-bold mb-4 hidden orbitron">
                REVEALING IN: <span id="seconds" class="text-3xl">45</span>S
            </div>

            <button id="betBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black text-xl orbitron shadow-lg transition-all active:scale-95 disabled:opacity-50 disabled:grayscale" onclick="handlePlay()">
                PLACE BET
            </button>
        </div>

        <div class="glass rounded-2xl overflow-hidden mb-10">
            <div class="bg-white/5 px-4 py-3 border-b border-white/10">
                <h3 class="orbitron text-xs font-bold text-gray-300">RECENT GAMES</h3>
            </div>
            <table class="w-full text-left text-xs">
                <thead>
                    <tr class="text-gray-500 border-b border-white/5">
                        <th class="px-4 py-3">CARD</th>
                        <th class="px-4 py-3">AMOUNT</th>
                        <th class="px-4 py-3">RESULT</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <tr class="border-b border-white/5">
                        <td class="px-4 py-3 font-bold text-blue-400">#2</td>
                        <td class="px-4 py-3">0.5 TON</td>
                        <td class="px-4 py-3 text-red-500 uppercase font-bold">Lost</td>
                    </tr>
                    <tr>
                        <td class="px-4 py-3 font-bold text-blue-400">#4</td>
                        <td class="px-4 py-3">1.0 TON</td>
                        <td class="px-4 py-3 text-green-500 uppercase font-bold">Won</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let selected = 0;
        let isGameState = "LOCKED";
        const gameAudio = new Audio("https://mcjkstdplhybfjjjtzyl.supabase.co/storage/v1/object/public/audio/sonican-powerful-epic-orchestral-45-seconds-330378.mp3");

        // 1. Enter Game Logic
        function enableAudio() {
            gameAudio.play().then(() => {
                gameAudio.pause();
                gameAudio.currentTime = 0;
                document.getElementById('soundOverlay').classList.add('hidden');
                isGameState = "IDLE"; // Unlock game
            }).catch(e => alert("Please interact with the screen first."));
        }

        // 4. Select Card Logic
        function selectCard(n) {
            if(isGameState !== "IDLE") return;
            selected = n;
            document.querySelectorAll('.card-face').forEach(f => f.classList.remove('selected-card'));
            document.getElementById('back' + n).classList.add('selected-card');
            document.getElementById('front' + n).classList.add('selected-card');
        }

        // 3. Auto Calculate Win (3.3x)
        function updateBet(v) { 
            const bet = parseFloat(v);
            const win = (bet * 3.3).toFixed(2);
            document.getElementById('betDisplay').innerText = bet.toFixed(2) + " TON"; 
            document.getElementById('winDisplay').innerText = win + " TON";
        }

        async function handlePlay() {
            if(selected === 0) return alert("Select a Card First!");
            if(isGameState !== "IDLE") return;

            try {
                gameAudio.currentTime = 0;
                await gameAudio.play();
            } catch(e) { console.log("Audio Error"); }

            isGameState = "BETTING";
            const btn = document.getElementById('betBtn');
            btn.disabled = true;
            btn.innerText = "WAITING...";
            
            startGame();
        }

        function startGame() {
            document.querySelectorAll('.card').forEach(c => {
                c.classList.remove('revealed');
                c.style.animation = "shake 0.2s infinite";
            });

            document.getElementById('timerDisplay').classList.remove('hidden');
            let timer = 45;
            const countdown = setInterval(() => {
                timer--;
                document.getElementById('seconds').innerText = timer;
                if(timer <= 0) {
                    clearInterval(countdown);
                    revealFinal();
                }
            }, 1000);
        }

        function revealFinal() {
            gameAudio.pause();
            isGameState = "REVEALED";
            document.querySelectorAll('.card').forEach(c => {
                c.style.animation = "none";
                c.classList.add('revealed');
            });

            // Mock Results
            const results = [7, 12, 1, 9];
            results.forEach((v, i) => document.getElementById('res' + (i+1)).innerText = v);

            setTimeout(() => {
                const btn = document.getElementById('betBtn');
                btn.disabled = false;
                btn.innerText = "PLACE BET";
                document.getElementById('timerDisplay').classList.add('hidden');
                isGameState = "IDLE";
            }, 5000);
        }

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://ggg121314.github.io/Golden-Game-Global-/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });
    </script>
</body>
</html>
