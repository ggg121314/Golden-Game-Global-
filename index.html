<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGG QUAD-CARD V1.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tonweb@0.0.66/dist/tonweb.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { background: radial-gradient(circle, #0d1b2a 0%, #000814 100%); font-family: 'Orbitron', sans-serif; color: #ffffff; min-height: 100vh; padding: 10px; overflow-x: hidden; }
        .card-container { perspective: 1000px; width: 100%; height: 160px; position: relative; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.8s; }
        .card.revealed { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .card-front { background: white; color: #1e293b; transform: rotateY(180deg); border: 3px solid #fbbf24; }
        .card-back { background-image: url('https://i.ibb.co/BVb4wg2R/Screenshot-2026-04-30-14-09-16-915-com-google-android-googlequicksearchbox-edit.jpg'); background-size: cover; border: 2px solid #3b82f6; }
        .selected-card { border: 4px solid #22c55e !important; box-shadow: 0 0 20px #22c55e; }
        #audio-locker { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-withdraw { background: linear-gradient(to right, #2563eb, #1d4ed8); color: white; font-size: 10px; padding: 6px; border-radius: 6px; font-weight: bold; }
        .shaking { animation: shake 0.4s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(0px, 0px); } }
    </style>
</head>
<body>

    <div class="flex justify-between items-center mb-4 px-2">
        <h1 class="text-lg font-bold text-blue-400">GGG QUAD-CARD</h1>
        <div id="ton-connect"></div>
    </div>

    <div class="max-w-md mx-auto">
        <div class="grid grid-cols-2 gap-3 mb-4 px-2">
            <div class="glass p-3 rounded-xl border-blue-500/30 border text-center">
                <p class="text-[9px] text-blue-400 font-bold uppercase mb-1">Pending Wins</p>
                <p class="text-lg font-bold text-white mb-2" id="pending-win">0.00</p>
                <button onclick="sendClaim('Claim')" class="btn-withdraw w-full uppercase">Claim</button>
            </div>
            <div class="glass p-3 rounded-xl border-purple-500/30 border text-center">
                <p class="text-[9px] text-purple-400 font-bold uppercase mb-1">Referral</p>
                <p class="text-lg font-bold text-white mb-2" id="ref-balance">0.00</p>
                <button onclick="sendClaim('WithdrawRef')" class="btn-withdraw w-full uppercase">Ref Withdraw</button>
            </div>
        </div>

        <div class="relative px-2 mb-4">
            <div id="audio-locker">
                <button onclick="enableAudio()" class="bg-blue-600 px-8 py-3 rounded-full font-black text-white shadow-lg">PLAY GAME</button>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="card-container" onclick="selectCard(1)"><div class="card" id="card1"><div class="card-face card-back" id="back1"></div><div class="card-face card-front text-5xl font-black text-blue-900">?</div></div></div>
                <div class="card-container" onclick="selectCard(2)"><div class="card" id="card2"><div class="card-face card-back" id="back2"></div><div class="card-face card-front text-5xl font-black text-blue-900">?</div></div></div>
                <div class="card-container" onclick="selectCard(3)"><div class="card" id="card3"><div class="card-face card-back" id="back3"></div><div class="card-face card-front text-5xl font-black text-blue-900">?</div></div></div>
                <div class="card-container" onclick="selectCard(4)"><div class="card" id="card4"><div class="card-face card-back" id="back4"></div><div class="card-face card-front text-5xl font-black text-blue-900">?</div></div></div>
            </div>
        </div>

        <div class="glass p-5 rounded-2xl mx-2">
            <div class="flex justify-between mb-2"><span class="text-[10px] text-gray-400 font-bold">BET AMOUNT</span><span class="text-sm text-blue-400 font-bold" id="betDisplay">0.1 TON</span></div>
            <input type="range" min="0.1" max="3.0" step="0.1" value="0.1" class="w-full mb-6 accent-blue-500" id="betRange" oninput="updateBet(this.value)">
            <div class="flex justify-between items-center bg-black/40 p-4 rounded-xl mb-6"><span class="text-[10px] text-gray-400 font-bold uppercase">Payout (3.3x)</span><span class="text-2xl font-bold text-yellow-400" id="winDisplay">0.33 TON</span></div>
            <button id="betBtn" class="w-full bg-blue-600 py-4 rounded-xl font-black text-lg shadow-xl" onclick="handlePlay()">PLACE BET</button>
        </div>
    </div>

    <script>
        const CONTRACT_ADDRESS = "EQDYV_dKO-1cfNbygX9_BsZ8OCsW7PKwHTmKYpSE9hIxMELm";
        const tonweb = new TonWeb();
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: "https://ggg121314.github.io/Golden-Game-Global-/tonconnect-manifest.json",
            buttonRootId: 'ton-connect'
        });

        let selected = 0;
        let isGameState = "LOCKED";
        const gameAudio = new Audio("https://mcjkstdplhybfjjjtzyl.supabase.co/storage/v1/object/public/audio/sonican-powerful-epic-orchestral-45-seconds-330378.mp3");

        function getReferrer() {
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            return (ref && TonWeb.utils.Address.isValid(ref)) ? ref : null;
        }

        async function updateBalances() {
            if (!tonConnectUI.account) return;
            try {
                const addr = new TonWeb.utils.Address(tonConnectUI.account.address).toString(true, true, true);
                const p = await tonweb.call(CONTRACT_ADDRESS, 'pendingWin', [['address', addr]]);
                const r = await tonweb.call(CONTRACT_ADDRESS, 'referralBalance', [['address', addr]]);
                document.getElementById('pending-win').innerText = TonWeb.utils.fromNano(p.stack[0][1]);
                document.getElementById('ref-balance').innerText = TonWeb.utils.fromNano(r.stack[0][1]);
            } catch (e) {}
        }
        setInterval(updateBalances, 8000);

        function enableAudio() {
            gameAudio.play().then(() => { gameAudio.pause(); document.getElementById('audio-locker').style.display = 'none'; isGameState = "IDLE"; });
        }

        function updateBet(v) {
            document.getElementById('betDisplay').innerText = parseFloat(v).toFixed(1) + " TON";
            document.getElementById('winDisplay').innerText = (v * 3.3).toFixed(2) + " TON";
        }

        function selectCard(n) {
            if(isGameState !== "IDLE") return;
            selected = n;
            document.querySelectorAll('.card-back').forEach(f => f.classList.remove('selected-card'));
            document.getElementById('back' + n).classList.add('selected-card');
        }

        async function handlePlay() {
            if (!tonConnectUI.connected) return alert("Connect Wallet!");
            if (selected === 0) return alert("Select Card!");
            
            try {
                const betVal = document.getElementById('betRange').value;
                const betInNano = TonWeb.utils.toNano(betVal);
                const totalAmount = betInNano.add(TonWeb.utils.toNano("0.05"));

                // ✅ TACT OPTIONAL ADDRESS LOGIC (FIXED)
                const cell = new TonWeb.boc.Cell();
                cell.bits.writeUint(0xCCCCDDDD, 32);      // Opcode
                cell.bits.writeCoins(betInNano);          // amount
                cell.bits.writeUint(selected, 8);         // chosenCard
                
                const ref = getReferrer();
                if (ref) {
                    cell.bits.writeBit(1); // Set bit to 1 (Address exists)
                    cell.bits.writeAddress(new TonWeb.utils.Address(ref));
                } else {
                    cell.bits.writeBit(0); // Set bit to 0 (Address is null)
                }

                const boc = await cell.toBoc(false);
                const payload = TonWeb.utils.bytesToBase64(boc);

                await tonConnectUI.sendTransaction({
                    validUntil: Math.floor(Date.now() / 1000) + 300,
                    messages: [{ address: CONTRACT_ADDRESS, amount: totalAmount.toString(), payload: payload }]
                });
                startVisualGame();
            } catch (e) { console.error(e); }
        }

        function startVisualGame() {
            isGameState = "PLAYING";
            gameAudio.currentTime = 0; gameAudio.play();
            document.querySelectorAll('.card').forEach(c => c.classList.add('shaking'));
            let time = 45;
            const btn = document.getElementById('betBtn');
            const timer = setInterval(() => {
                time--; btn.innerText = `REVEALING ${time}s...`;
                if(time <= 0) { 
                    clearInterval(timer);
                    document.querySelectorAll('.card').forEach(c => { c.classList.remove('shaking'); c.classList.add('revealed'); });
                    setTimeout(() => {
                        isGameState = "IDLE"; btn.innerText = "PLACE BET";
                        document.querySelectorAll('.card').forEach(c => c.classList.remove('revealed'));
                        selected = 0;
                        document.querySelectorAll('.card-back').forEach(f => f.classList.remove('selected-card'));
                        updateBalances();
                    }, 5000);
                }
            }, 1000);
        }

        async function sendClaim(text) {
            const cell = new TonWeb.boc.Cell();
            cell.bits.writeUint(0, 32); 
            cell.bits.writeString(text);
            const boc = await cell.toBoc(false);
            const payload = TonWeb.utils.bytesToBase64(boc);
            await tonConnectUI.sendTransaction({
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{ address: CONTRACT_ADDRESS, amount: TonWeb.utils.toNano("0.05").toString(), payload: payload }]
            });
        }
    </script>
</body>
</html>
