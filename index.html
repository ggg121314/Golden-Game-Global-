<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGG Quad-Card Game 2 (V5.6)</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tonweb@0.0.66/dist/tonweb.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #1e293b; padding: 20px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h2 { color: #38bdf8; }
        .card-container { display: flex; justify-content: space-around; margin: 20px 0; }
        .card { width: 80px; height: 110px; background: #334155; border: 2px solid #475569; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .card.selected { border-color: #38bdf8; background: #075985; transform: scale(1.1); box-shadow: 0 0 15px #38bdf8; }
        .card.winner { border-color: #22c55e; background: #14532d; }
        .card.revealed { background: white; color: black; border-color: #94a3b8; }
        .controls { margin-top: 20px; }
        input { padding: 10px; width: 60%; border-radius: 5px; border: none; margin-bottom: 10px; font-size: 16px; }
        button { padding: 12px 25px; background: #38bdf8; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
        button:disabled { background: #64748b; cursor: not-allowed; }
        #status { margin-top: 15px; padding: 10px; border-radius: 5px; font-size: 14px; }
        .pending-wins { background: #14532d; padding: 10px; border-radius: 5px; margin: 10px 0; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🃏 GGG QUAD-CARD - GAME 2</h2>
    <div id="ton-connect"></div>

    <div class="pending-wins" id="winBox">
        နိုင်ငွေရှိသည်: <span id="pendingAmount">0</span> TON 
        <button onclick="claimWin()" style="width: auto; padding: 5px 10px; margin-left: 10px;">Claim</button>
    </div>

    <div class="card-container">
        <div class="card" onclick="selectCard(1)" id="c1">1</div>
        <div class="card" onclick="selectCard(2)" id="c2">2</div>
        <div class="card" onclick="selectCard(3)" id="c3">3</div>
        <div class="card" onclick="selectCard(4)" id="c4">4</div>
    </div>

    <div class="controls">
        <p>လောင်းကြေးထည့်ပါ (0.1 - 3.1 TON)</p>
        <input type="number" id="betAmount" value="0.1" step="0.1" min="0.1" max="3.1">
        <p style="font-size: 12px; color: #94a3b8;">* Gas fee 0.05 TON အလိုအလျောက် ပေါင်းထည့်ပါမည်</p>
        <button id="playBtn" onclick="playGame()">BET & SPIN</button>
    </div>

    <div id="status">ပိုက်ဆံအိတ်ချိတ်ဆက်ပါ...</div>
</div>

<script>
    const contractAddress = "EQD6TMJWL6O4h4uo7z0c35d4F_wGc3EO9JYL4pPoKqdsHpQ_";
    let selectedIdx = 0;
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp-with-react-ui/main/public/tonconnect-manifest.json',
        buttonRootId: 'ton-connect'
    });

    function selectCard(idx) {
        selectedIdx = idx;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('selected', 'winner', 'revealed'));
        document.querySelectorAll('.card').forEach((c, i) => { if(i+1 === idx) c.classList.add('selected'); c.innerText = i+1; });
    }

    async function playGame() {
        if (!selectedIdx) return alert("ဖဲချပ်အရင်ရွေးပါ");
        const amount = document.getElementById('betAmount').value;
        const betInNano = (parseFloat(amount) * 1e9).toString();
        const totalInNano = (parseFloat(amount) + 0.05) * 1e9; // 0.05 Gas Fee Added

        document.getElementById('playBtn').disabled = true;
        document.getElementById('status').innerText = "Blockchain သို့ ပို့ဆောင်နေသည်...";

        try {
            // Tact V5.6 BetGame2 Message (Cell Encoding)
            const body = new TonWeb.boc.Cell();
            body.bits.writeUint(0xCCCCDDDD, 32); // Message OpCode
            body.bits.writeCoins(new TonWeb.utils.BN(betInNano)); // msg.amount
            body.bits.writeUint(selectedIdx, 8); // chosenCard
            // Referrer: None for this test step
            body.bits.writeUint(0, 1); 

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 60,
                messages: [{
                    address: contractAddress,
                    amount: totalInNano.toString(),
                    payload: TonWeb.utils.bytesToBase64(await body.toBoc())
                }]
            };

            await tonConnectUI.sendTransaction(transaction);
            document.getElementById('status').innerText = "အောင်မြင်သည်! ရလဒ်စောင့်နေသည် (၄၅ စက္ကန့်အတွင်း)...";
            
            // Start checking for events or balance updates
            checkResult();

        } catch (e) {
            document.getElementById('status').innerText = "Transaction ပယ်ဖျက်လိုက်သည်";
            document.getElementById('playBtn').disabled = false;
        }
    }

    // စကားပြန် (Event Listener/Checker)
    async function checkResult() {
        // မှတ်ချက်- တကယ့် Game မှာ Event Listening သုံးရမှာဖြစ်ပေမယ့် 
        // ဒီအဆင့်မှာ UI မှာ ဖဲချပ်တွေ ပြသဖို့အတွက် ၄၅ စက္ကန့်အကြာမှာ Contract Balance/Pending ကို စစ်ဆေးပြသပေးပါမယ်
        setTimeout(async () => {
            document.getElementById('status').innerText = "ရလဒ်ထွက်ပေါ်လာပါပြီ!";
            // ဒီနေရာမှာ Contract ကနေ emit လုပ်လိုက်တဲ့ Result ကို UI မှာ ပြပေးဖို့ Logic ဆက်လက်ထည့်သွင်းနိုင်ပါတယ်
            // စမ်းသပ်ရန်အတွက် ယာယီ ကတ်လှန်ပြခြင်း
            revealCardsRandomly(); 
            updatePendingWin();
            document.getElementById('playBtn').disabled = false;
        }, 15000); // Transaction Confirm ဖြစ်ချိန်ကို ၁၅ စက္ကန့် ခန့်မှန်းထားသည်
    }

    function revealCardsRandomly() {
        // UI အမြင်အတွက် ယာယီပြသခြင်း (Contract က ရလဒ်အမှန်ကို Getter နဲ့ ခေါ်ယူရမည်)
        alert("Contract တွင် ရလဒ်ထွက်ပေါ်ပါပြီ။ သင်၏ Pending Wins ကို စစ်ဆေးကြည့်ပါ။");
    }

    async function updatePendingWin() {
        // Getter function 'pendingWin' ကို ခေါ်ယူပြီး UI မှာ ပြသရန်
        // TonWeb API သုံးပြီး Getter ခေါ်ယူသည့် logic
        try {
            const userAddress = tonConnectUI.account.address;
            const tonweb = new TonWeb();
            const result = await tonweb.call(contractAddress, 'pendingWin', [['address', userAddress]]);
            const winNano = result.stack[0][1];
            if (winNano > 0) {
                document.getElementById('winBox').style.display = "block";
                document.getElementById('pendingAmount').innerText = (winNano / 1e9).toFixed(2);
            }
        } catch(e) {}
    }

    async function claimWin() {
        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 60,
            messages: [{
                address: contractAddress,
                amount: "50000000", // 0.05 TON for gas
                payload: TonWeb.utils.bytesToBase64(await (new TonWeb.boc.Cell().bits.writeUint(0, 32).writeString("Claim")).toBoc())
            }]
        };
        await tonConnectUI.sendTransaction(transaction);
    }
</script>

</body>
</html>
