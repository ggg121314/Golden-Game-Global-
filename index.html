<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGG QUAD-CARD LEGACY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body {
            background: radial-gradient(circle, #0d1b2a 0%, #000814 100%);
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }
        .card {
            width: 100%;
            height: 160px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        /* Card Flipping Classes */
        .card.is-flipped { transform: rotateY(180deg); }
        
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            border: 2px solid #3b82f6;
        }
        /* Front Face (Revealed Card) */
        .card-front {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            color: #fbbf24;
            transform: rotateY(180deg);
            background-image: url('https://i.ibb.co/CKSQMPnm/Screenshot-2026-04-30-14-09-57-530-com-google-android-googlequicksearchbox-edit.jpg');
            background-size: cover;
            background-position: center;
        }
        /* Back Face (Hidden Card) */
        .card-back {
            background-image: url('https://i.ibb.co/BVb4wg2R/Screenshot-2026-04-30-14-09-16-915-com-google-android-googlequicksearchbox-edit.jpg');
            background-size: cover;
            background-position: center;
        }
        
        /* Shaking Animation for 45s */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(-1deg); }
            40% { transform: translate(-3px, 0px) rotate(1deg); }
            60% { transform: translate(3px, 2px) rotate(0deg); }
            80% { transform: translate(1px, -1px) rotate(1deg); }
            100% { transform: translate(-1px, 2px) rotate(-1deg); }
        }
        .shaking { animation: shake 0.5s infinite; }

        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4">

    <audio id="gameMusic" src="https://github.com/ggg121314/Golden-Game-Global-/raw/refs/heads/main/sonican-powerful-epic-orchestral-45-seconds-330378.mp3"></audio>

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-bold text-blue-400">GGG QUAD-CARD</h1>
        <div id="ton-connect"></div>
    </div>

    <div class="max-w-md mx-auto">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass p-3 rounded-xl text-center">
                <p class="text-[10px] text-gray-400">PENDING</p>
                <p class="text-lg font-bold text-green-500" id="pending-win">0.00 TON</p>
            </div>
            <div class="glass p-3 rounded-xl text-center">
                <p class="text-[10px] text-gray-400">REFERRAL</p>
                <p class="text-lg font-bold text-yellow-500" id="ref-balance">0.00 TON</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8" id="cardContainer">
            <div class="card" id="card1" onclick="selectCard(1)">
                <div class="card-face card-front" id="val1">?</div>
                <div class="card-face card-back"></div>
            </div>
            <div class="card" id="card2" onclick="selectCard(2)">
                <div class="card-face card-front" id="val2">?</div>
                <div class="card-face card-back"></div>
            </div>
            <div class="card" id="card3" onclick="selectCard(3)">
                <div class="card-face card-front" id="val3">?</div>
                <div class="card-face card-back"></div>
            </div>
            <div class="card" id="card4" onclick="selectCard(4)">
                <div class="card-face card-front" id="val4">?</div>
                <div class="card-face card-back"></div>
            </div>
        </div>

        <div class="glass p-6 rounded-2xl">
            <div class="flex justify-between mb-2">
                <span class="text-sm">Bet Amount</span>
                <span class="text-sm font-bold text-blue-400" id="betDisplay">0.1 TON</span>
            </div>
            <input type="range" min="0.1" max="3.1" step="0.1" value="0.1" class="w-full mb-4" id="betRange" oninput="updateBet(this.value)">
            
            <div id="timerDisplay" class="text-center text-yellow-500 font-bold mb-4 hidden">Next Reveal in: <span id="seconds">45</span>s</div>

            <button id="betBtn" class="w-full bg-blue-600 py-4 rounded-xl font-bold shadow-lg" onclick="startBetProcess()">PLACE BET (3.3x)</button>
        </div>
    </div>

    <script>
        let selected = 0;
        const music = document.getElementById('gameMusic');

        function selectCard(n) {
            selected = n;
            document.querySelectorAll('.card').forEach(c => c.style.border = "none");
            document.getElementById('card'+n).style.border = "2px solid #fbbf24";
        }

        function updateBet(v) { document.getElementById('betDisplay').innerText = v + " TON"; }

        function startBetProcess() {
            if(selected === 0) return alert("Select a Card!");

            // 1. Flip all cards back (မှောက်လိုက်မယ်)
            document.querySelectorAll('.card').forEach(c => {
                c.classList.add('is-flipped');
                c.classList.add('shaking'); // 2. Start shaking
            });

            // 3. Play Music
            music.play();

            // 4. Timer Logic (45s)
            document.getElementById('timerDisplay').classList.remove('hidden');
            let timeLeft = 45;
            let countdown = setInterval(() => {
                timeLeft--;
                document.getElementById('seconds').innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(countdown);
                    revealResults();
                }
            }, 1000);
        }

        function revealResults() {
            // 5. Stop Shaking & Music
            document.querySelectorAll('.card').forEach(c => c.classList.remove('shaking'));
            music.pause();
            music.currentTime = 0;

            // 6. Flip to Front (လှန်လိုက်မယ်)
            // ဒီနေရာမှာ Contract ကလာတဲ့ result တွေကို ထည့်ရပါမယ်
            // ဥပမာ - Card 1 = 12, Card 2 = 5, etc.
            document.getElementById('val1').innerText = "12";
            document.getElementById('val2').innerText = "5";
            document.getElementById('val3').innerText = "8";
            document.getElementById('val4').innerText = "2";

            document.querySelectorAll('.card').forEach(c => c.classList.remove('is-flipped'));
            document.getElementById('timerDisplay').classList.add('hidden');
        }

        // Initialize TonConnect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://ggg121314.github.io/Golden-Game-Global-/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });
    </script>
</body>
</html>
