<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGG QUAD-CARD LEGACY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body {
            background: radial-gradient(circle, #0d1b2a 0%, #000814 100%);
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            user-select: none;
        }

        .card-container { perspective: 1000px; width: 100%; height: 160px; cursor: pointer; }
        .card {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card.revealed { transform: rotateY(180deg); }
        
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
        }

        /* Result Side (White) */
        .card-front {
            background-color: #f8fafc;
            transform: rotateY(180deg);
            background-image: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
        }

        /* Logo Side (Dark) */
        .card-back {
            background-image: url('https://i.ibb.co/BVb4wg2R/Screenshot-2026-04-30-14-09-16-915-com-google-android-googlequicksearchbox-edit.jpg');
            background-size: cover; background-position: center;
        }
        
        /* 🔥 NEON GREEN SELECTION (Front & Back) */
        .selected-card { 
            border: 4px solid #22c55e !important; 
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.8), inset 0 0 10px rgba(34, 197, 94, 0.5);
            z-index: 10;
        }
        
        .result-val { font-size: 3.5rem; font-weight: 900; color: #fbbf24; text-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0.5deg); }
            50% { transform: translate(-1px, -1px) rotate(-0.5deg); }
            100% { transform: translate(1px, 1px) rotate(0.5deg); }
        }
        .shaking { animation: shake 0.1s infinite; }
        
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-bold text-blue-400">GGG QUAD-CARD</h1>
        <div id="ton-connect"></div>
    </div>

    <div class="max-w-md mx-auto">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass p-3 rounded-xl text-center">
                <p class="text-[10px] text-gray-400 font-bold uppercase">Pending Wins</p>
                <p class="text-lg font-bold text-green-500" id="pending-win">0.00 TON</p>
            </div>
            <div class="glass p-3 rounded-xl text-center">
                <p class="text-[10px] text-gray-400 font-bold uppercase">Referral</p>
                <p class="text-lg font-bold text-yellow-500" id="ref-balance">0.00 TON</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="card-container" onclick="selectCard(1)">
                <div class="card" id="card1">
                    <div class="card-face card-back" id="back1"></div>
                    <div class="card-face card-front" id="front1"><span class="result-val" id="res1">?</span></div>
                </div>
            </div>
            <div class="card-container" onclick="selectCard(2)">
                <div class="card" id="card2">
                    <div class="card-face card-back" id="back2"></div>
                    <div class="card-face card-front" id="front2"><span class="result-val" id="res2">?</span></div>
                </div>
            </div>
            <div class="card-container" onclick="selectCard(3)">
                <div class="card" id="card3">
                    <div class="card-face card-back" id="back3"></div>
                    <div class="card-face card-front" id="front3"><span class="result-val" id="res3">?</span></div>
                </div>
            </div>
            <div class="card-container" onclick="selectCard(4)">
                <div class="card" id="card4">
                    <div class="card-face card-back" id="back4"></div>
                    <div class="card-face card-front" id="front4"><span class="result-val" id="res4">?</span></div>
                </div>
            </div>
        </div>

        <div class="glass p-6 rounded-2xl shadow-xl">
            <div class="flex justify-between mb-2">
                <span class="text-sm font-bold text-gray-400">BET AMOUNT</span>
                <span class="text-sm font-bold text-blue-400" id="betDisplay">0.1 TON</span>
            </div>
            <input type="range" min="0.1" max="3.1" step="0.1" value="0.1" class="w-full mb-6 accent-blue-500" id="betRange" oninput="updateBet(this.value)">
            
            <div id="timerDisplay" class="text-center text-yellow-500 font-bold mb-4 hidden">
                REVEALING IN: <span id="seconds" class="text-3xl">45</span>s
            </div>

            <button id="betBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold shadow-lg transition-all active:scale-95 disabled:opacity-50" onclick="handlePlay()">
                PLACE BET (3.3x)
            </button>
        </div>
    </div>

    <script>
        let selected = 0;
        let isGameState = "IDLE"; // IDLE, BETTING, REVEALED

        // ✅ ADVANCED AUDIO CONTROLLER
        const AUDIO_URL = "https://raw.githubusercontent.com/ggg121314/Golden-Game-Global-/main/sonican-powerful-epic-orchestral-45-seconds-330378.mp3";
        const gameAudio = new Audio();
        gameAudio.src = AUDIO_URL;
        gameAudio.preload = "auto";

        // ✅ FORCED BUFFERING (Infrastructure Fix)
        window.addEventListener('load', () => gameAudio.load());

        function selectCard(n) {
            if(isGameState === "BETTING") return;
            selected = n;
            
            // Clear all borders on both faces
            document.querySelectorAll('.card-face').forEach(f => f.classList.remove('selected-card'));
            
            // Highlight selected card (both back and front for visible selection)
            document.getElementById('back' + n).classList.add('selected-card');
            document.getElementById('front' + n).classList.add('selected-card');
        }

        function updateBet(v) { document.getElementById('betDisplay').innerText = v + " TON"; }

        async function handlePlay() {
            if(selected === 0) return alert("Please select a card!");
            if(isGameState === "BETTING") return;

            isGameState = "BETTING";
            const btn = document.getElementById('betBtn');
            btn.disabled = true;
            btn.innerText = "STARTING...";

            // ✅ TRIGGER AUDIO WITH READYSTATE CHECK
            if (gameAudio.readyState >= 2) {
                gameAudio.currentTime = 0;
                gameAudio.play().catch(e => console.log("User interaction required"));
            } else {
                gameAudio.load();
                gameAudio.oncanplay = () => gameAudio.play();
            }

            // Start Shake Animation
            document.querySelectorAll('.card').forEach(c => {
                c.classList.remove('revealed');
                c.classList.add('shaking');
            });

            document.getElementById('timerDisplay').classList.remove('hidden');
            let timer = 45;
            const countdown = setInterval(() => {
                timer--;
                document.getElementById('seconds').innerText = timer;
                if(timer <= 0) {
                    clearInterval(countdown);
                    revealFinal();
                }
            }, 1000);
        }

        function revealFinal() {
            gameAudio.pause();
            isGameState = "REVEALED";
            document.querySelectorAll('.card').forEach(c => {
                c.classList.remove('shaking');
                c.classList.add('revealed');
            });

            // Mock result values
            const mock = [7, 12, 1, 9];
            mock.forEach((v, i) => document.getElementById('res' + (i+1)).innerText = v);

            setTimeout(() => {
                const btn = document.getElementById('betBtn');
                btn.disabled = false;
                btn.innerText = "PLACE BET (3.3x)";
                document.getElementById('timerDisplay').classList.add('hidden');
                // Allow re-selection in REVEALED state
            }, 3000);
        }

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://ggg121314.github.io/Golden-Game-Global-/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });
    </script>
</body>
</html>
