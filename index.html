<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGG QUAD-CARD LEGACY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body {
            background: radial-gradient(circle, #0d1b2a 0%, #000814 100%);
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 3D CARD ENGINE */
        .card-container { perspective: 1000px; width: 100%; height: 160px; }
        
        .card {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* THE FLIP: Rotate 180 degrees on Y axis */
        .card.revealed { transform: rotateY(180deg); }
        
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* Front: Result Side (Turns 180 deg by default) */
        .card-front {
            background-image: url('https://i.ibb.co/CKSQMPnm/Screenshot-2026-04-30-14-09-57-530-com-google-android-googlequicksearchbox-edit.jpg');
            background-size: cover; background-position: center;
            transform: rotateY(180deg); /* Turned around behind back */
            border: 2px solid #fbbf24;
        }

        /* Back: Logo Side (Visible first) */
        .card-back {
            background-image: url('https://i.ibb.co/BVb4wg2R/Screenshot-2026-04-30-14-09-16-915-com-google-android-googlequicksearchbox-edit.jpg');
            background-size: cover; background-position: center;
            border: 2px solid #3b82f6;
        }
        
        .result-val { font-size: 3rem; font-weight: 900; color: #fbbf24; text-shadow: 2px 2px 10px #000; }
        
        /* SHAKING */
        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(1deg) translate(1px, 1px); }
            50% { transform: rotate(-1deg) translate(-1px, -1px); }
            75% { transform: rotate(1deg) translate(-1px, 1px); }
            100% { transform: rotate(0deg); }
        }
        .shaking { animation: shake 0.2s infinite; }
        
        .selected-card { border: 4px solid #fbbf24 !important; box-shadow: 0 0 25px #fbbf24; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-bold text-blue-400">GGG QUAD-CARD</h1>
        <div id="ton-connect"></div>
    </div>

    <div class="max-w-md mx-auto">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass p-3 rounded-xl text-center">
                <p class="text-[10px] text-gray-400">PENDING WINS</p>
                <p class="text-lg font-bold text-green-500" id="pending-win">0.00 TON</p>
            </div>
            <div class="glass p-3 rounded-xl text-center">
                <p class="text-[10px] text-gray-400">REFERRAL</p>
                <p class="text-lg font-bold text-yellow-500" id="ref-balance">0.00 TON</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="card-container" onclick="selectCard(1)">
                <div class="card" id="card1">
                    <div class="card-face card-back" id="back1"></div>
                    <div class="card-face card-front"><span class="result-val" id="res1">?</span></div>
                </div>
            </div>
            <div class="card-container" onclick="selectCard(2)">
                <div class="card" id="card2">
                    <div class="card-face card-back" id="back2"></div>
                    <div class="card-face card-front"><span class="result-val" id="res2">?</span></div>
                </div>
            </div>
            <div class="card-container" onclick="selectCard(3)">
                <div class="card" id="card3">
                    <div class="card-face card-back" id="back3"></div>
                    <div class="card-face card-front"><span class="result-val" id="res3">?</span></div>
                </div>
            </div>
            <div class="card-container" onclick="selectCard(4)">
                <div class="card" id="card4">
                    <div class="card-face card-back" id="back4"></div>
                    <div class="card-face card-front"><span class="result-val" id="res4">?</span></div>
                </div>
            </div>
        </div>

        <div class="glass p-6 rounded-2xl shadow-xl">
            <div class="flex justify-between mb-2">
                <span class="text-sm font-bold text-gray-400 uppercase">Bet Amount</span>
                <span class="text-sm font-bold text-blue-400" id="betDisplay">0.1 TON</span>
            </div>
            <input type="range" min="0.1" max="3.1" step="0.1" value="0.1" class="w-full mb-6" id="betRange" oninput="updateBet(this.value)">
            
            <div id="timerDisplay" class="text-center text-yellow-500 font-bold mb-4 hidden">
                REVEALING IN: <span id="seconds" class="text-2xl">45</span>s
            </div>

            <button id="betBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold shadow-lg transition-all active:scale-95" onclick="runProfessionalBet()">
                PLACE BET (3.3x)
            </button>
        </div>
    </div>

    <script>
        let selected = 0;
        let isRunning = false;
        
        // ULTIMATE AUDIO SYSTEM
        const audioUrl = "https://github.com/ggg121314/Golden-Game-Global-/raw/refs/heads/main/sonican-powerful-epic-orchestral-45-seconds-330378.mp3";
        const gameAudio = new Audio(audioUrl);
        gameAudio.crossOrigin = "anonymous";
        gameAudio.preload = "auto";

        function selectCard(n) {
            if(isRunning) return;
            selected = n;
            document.querySelectorAll('.card-back').forEach(b => b.classList.remove('selected-card'));
            document.getElementById('back'+n).classList.add('selected-card');
        }

        function updateBet(v) { document.getElementById('betDisplay').innerText = v + " TON"; }

        function runProfessionalBet() {
            if(selected === 0) return alert("Please select a card!");
            if(isRunning) return;

            // 1. FORCE START AUDIO
            gameAudio.currentTime = 0;
            gameAudio.play().catch(e => {
                console.error("Audio block bypass failed, retrying...");
                // Force a second play attempt
                let retry = setInterval(() => { gameAudio.play(); clearInterval(retry); }, 100);
            });

            isRunning = true;
            document.getElementById('betBtn').disabled = true;
            document.getElementById('betBtn').innerText = "SYSTEM WORKING...";

            // 2. START SHAKING
            document.querySelectorAll('.card').forEach(c => {
                c.classList.remove('revealed');
                c.classList.add('shaking');
            });

            // 3. SHOW TIMER
            document.getElementById('timerDisplay').classList.remove('hidden');
            let timeLeft = 45;
            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById('seconds').innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    revealFinal();
                }
            }, 1000);
        }

        function revealFinal() {
            // 4. STOP AUDIO & SHAKING
            gameAudio.pause();
            document.querySelectorAll('.card').forEach(c => c.classList.remove('shaking'));

            // 5. 180 DEGREE FLIP
            document.querySelectorAll('.card').forEach(c => {
                c.classList.add('revealed');
            });

            // 6. SHOW MOCK RESULTS (Will replace with real Contract Event)
            const mockRes = [7, 12, 1, 9];
            mockRes.forEach((val, i) => {
                document.getElementById('res' + (i+1)).innerText = val;
            });

            // RESET
            setTimeout(() => {
                isRunning = false;
                document.getElementById('betBtn').disabled = false;
                document.getElementById('betBtn').innerText = "PLACE BET (3.3x)";
                document.getElementById('timerDisplay').classList.add('hidden');
            }, 6000);
        }

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://ggg121314.github.io/Golden-Game-Global-/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });
    </script>
</body>
</html>
