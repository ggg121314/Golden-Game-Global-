<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGG QUAD-CARD LEGACY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body {
            background: radial-gradient(circle, #0d1b2a 0%, #000814 100%);
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        .card-container { perspective: 1000px; width: 100%; height: 160px; cursor: pointer; }
        .card {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card.revealed { transform: rotateY(180deg); }
        
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(59, 130, 246, 0.5);
        }

        /* Result Side */
        .card-front {
            background-image: url('https://i.ibb.co/CKSQMPnm/Screenshot-2026-04-30-14-09-57-530-com-google-android-googlequicksearchbox-edit.jpg');
            background-size: cover; background-position: center;
            transform: rotateY(180deg);
            border-color: #fbbf24;
        }

        /* Logo Side */
        .card-back {
            background-image: url('https://i.ibb.co/BVb4wg2R/Screenshot-2026-04-30-14-09-16-915-com-google-android-googlequicksearchbox-edit.jpg');
            background-size: cover; background-position: center;
        }
        
        /* 🔥 SELECTION HIGHLIGHT (Neon Green) */
        .selected-card { 
            border: 4px solid #22c55e !important; 
            box-shadow: 0 0 20px #22c55e, inset 0 0 10px #22c55e;
            transform: scale(1.02);
        }
        
        .result-val { font-size: 3rem; font-weight: 900; color: #fbbf24; text-shadow: 0 0 15px #000; }
        
        @keyframes shake {
            0% { transform: rotate(0.5deg) translate(1px, 1px); }
            50% { transform: rotate(-0.5deg) translate(-1px, -1px); }
            100% { transform: rotate(0.5deg) translate(1px, 1px); }
        }
        .shaking { animation: shake 0.15s infinite; }
        
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-bold text-blue-400">GGG QUAD-CARD</h1>
        <div id="ton-connect"></div>
    </div>

    <div class="max-w-md mx-auto">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass p-3 rounded-xl text-center">
                <p class="text-[10px] text-gray-400 font-bold uppercase">Pending Wins</p>
                <p class="text-lg font-bold text-green-500" id="pending-win">0.00 TON</p>
            </div>
            <div class="glass p-3 rounded-xl text-center">
                <p class="text-[10px] text-gray-400 font-bold uppercase">Referral</p>
                <p class="text-lg font-bold text-yellow-500" id="ref-balance">0.00 TON</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="card-container" onclick="selectCard(1)">
                <div class="card" id="card1">
                    <div class="card-face card-back" id="back1"></div>
                    <div class="card-face card-front"><span class="result-val" id="res1">?</span></div>
                </div>
            </div>
            <div class="card-container" onclick="selectCard(2)">
                <div class="card" id="card2">
                    <div class="card-face card-back" id="back2"></div>
                    <div class="card-face card-front"><span class="result-val" id="res2">?</span></div>
                </div>
            </div>
            <div class="card-container" onclick="selectCard(3)">
                <div class="card" id="card3">
                    <div class="card-face card-back" id="back3"></div>
                    <div class="card-face card-front"><span class="result-val" id="res3">?</span></div>
                </div>
            </div>
            <div class="card-container" onclick="selectCard(4)">
                <div class="card" id="card4">
                    <div class="card-face card-back" id="back4"></div>
                    <div class="card-face card-front"><span class="result-val" id="res4">?</span></div>
                </div>
            </div>
        </div>

        <div class="glass p-6 rounded-2xl shadow-2xl border-blue-900/30">
            <div class="flex justify-between mb-2">
                <span class="text-sm font-bold text-gray-300">BET AMOUNT</span>
                <span class="text-sm font-bold text-blue-400" id="betDisplay">0.1 TON</span>
            </div>
            <input type="range" min="0.1" max="3.1" step="0.1" value="0.1" class="w-full mb-6 accent-blue-500" id="betRange" oninput="updateBet(this.value)">
            
            <div id="timerDisplay" class="text-center text-yellow-500 font-bold mb-4 hidden">
                REVEALING IN: <span id="seconds" class="text-3xl">45</span>s
            </div>

            <button id="betBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold shadow-lg transition-all active:scale-95 disabled:opacity-50" onclick="processBet()">
                PLACE BET (3.3x)
            </button>
        </div>
    </div>

    <script>
        let selected = 0;
        let isPlaying = false;

        // ✅ PRO AUDIO SYSTEM (FIXED CDN)
        const AUDIO_URL = "https://raw.githubusercontent.com/ggg121314/Golden-Game-Global-/main/sonican-powerful-epic-orchestral-45-seconds-330378.mp3";
        const gameAudio = new Audio(AUDIO_URL);
        gameAudio.preload = "auto";
        gameAudio.crossOrigin = "anonymous";

        // ✅ MOBILE AUDIO UNLOCKER (Crucial Fix)
        document.addEventListener('click', function unlockAudio() {
            gameAudio.play().then(() => {
                gameAudio.pause();
                gameAudio.currentTime = 0;
            }).catch(e => console.log("Waiting for user gesture..."));
            document.removeEventListener('click', unlockAudio);
        }, { once: true });

        function selectCard(n) {
            if(isPlaying) return;
            selected = n;
            // Clear all borders
            document.querySelectorAll('.card-back').forEach(b => b.classList.remove('selected-card'));
            // Add Green Neon Border to selected
            document.getElementById('back' + n).classList.add('selected-card');
        }

        function updateBet(v) { document.getElementById('betDisplay').innerText = v + " TON"; }

        async function processBet() {
            if(selected === 0) return alert("Please select a card first!");
            if(isPlaying) return;

            // ✅ SAFE PLAY LOGIC
            try {
                gameAudio.currentTime = 0;
                await gameAudio.play();
            } catch (err) {
                console.log("Play failed, reloading...");
                gameAudio.load();
                gameAudio.oncanplaythrough = () => gameAudio.play();
            }

            isPlaying = true;
            const btn = document.getElementById('betBtn');
            btn.disabled = true;
            btn.innerText = "WAITING FOR BLOCKCHAIN...";

            // Start Animation
            document.querySelectorAll('.card').forEach(c => {
                c.classList.remove('revealed');
                c.classList.add('shaking');
            });

            document.getElementById('timerDisplay').classList.remove('hidden');
            let timer = 45;
            const countdown = setInterval(() => {
                timer--;
                document.getElementById('seconds').innerText = timer;
                if(timer <= 0) {
                    clearInterval(countdown);
                    showResults();
                }
            }, 1000);
        }

        function showResults() {
            gameAudio.pause();
            document.querySelectorAll('.card').forEach(c => {
                c.classList.remove('shaking');
                c.classList.add('revealed');
            });

            // Mock result values
            const mock = [7, 12, 1, 9];
            mock.forEach((v, i) => document.getElementById('res' + (i+1)).innerText = v);

            setTimeout(() => {
                isPlaying = false;
                document.getElementById('betBtn').disabled = false;
                document.getElementById('betBtn').innerText = "PLACE BET (3.3x)";
                document.getElementById('timerDisplay').classList.add('hidden');
            }, 6000);
        }

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://ggg121314.github.io/Golden-Game-Global-/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });
    </script>
</body>
</html>
