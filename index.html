<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGG QUAD-CARD LEGACY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body {
            background: radial-gradient(circle, #0d1b2a 0%, #000814 100%);
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            padding: 10px;
        }

        /* Card Styling - ဖဲချပ်ပုံစံ */
        .card-container { perspective: 1000px; width: 100%; height: 180px; position: relative; }
        .card {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card.revealed { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .card-front { background: white; color: #1e293b; transform: rotateY(180deg); }
        .card-back {
            background-image: url('https://i.ibb.co/BVb4wg2R/Screenshot-2026-04-30-14-09-16-915-com-google-android-googlequicksearchbox-edit.jpg');
            background-size: cover; border: 2px solid #3b82f6;
        }
        .selected-card { border: 4px solid #22c55e !important; box-shadow: 0 0 20px #22c55e; }

        /* Sound Overlay over Cards */
        #audio-locker {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 100; border-radius: 15px; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }

        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-withdraw { background: #2563eb; color: white; font-size: 10px; padding: 4px 8px; border-radius: 5px; }
        
        /* Table Styling */
        table { width: 100%; font-size: 12px; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
    </style>
</head>
<body>

    <div class="flex justify-between items-center mb-4">
        <h1 class="text-lg font-bold text-blue-400">GGG QUAD-CARD</h1>
        <div id="ton-connect"></div>
    </div>

    <div class="max-w-md mx-auto">
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="glass p-3 rounded-xl border-green-500/50 border">
                <p class="text-[10px] text-green-400 font-bold uppercase">Pending Wins</p>
                <p class="text-md font-bold text-white mb-2" id="pending-win">0.00 TON</p>
                <button class="btn-withdraw">WITHDRAW</button>
            </div>
            <div class="glass p-3 rounded-xl border-green-500/50 border">
                <p class="text-[10px] text-green-400 font-bold uppercase">Referral</p>
                <p class="text-md font-bold text-white mb-2" id="ref-balance">0.00 TON</p>
                <button class="btn-withdraw">WITHDRAW</button>
            </div>
        </div>

        <div class="relative">
            <div id="audio-locker">
                <button onclick="enableAudio()" class="bg-blue-600 px-6 py-3 rounded-full font-bold shadow-lg animate-bounce">
                    🔊 ENTER WITH SONG
                </button>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="card-container" id="container1" onclick="selectCard(1)">
                    <div class="card" id="card1">
                        <div class="card-face card-back" id="back1"></div>
                        <div class="card-face card-front"><span class="text-4xl font-black" id="res1">?</span></div>
                    </div>
                </div>
                <div class="card-container" id="container2" onclick="selectCard(2)">
                    <div class="card" id="card2">
                        <div class="card-face card-back" id="back2"></div>
                        <div class="card-face card-front"><span class="text-4xl font-black" id="res2">?</span></div>
                    </div>
                </div>
                <div class="card-container" id="container3" onclick="selectCard(3)">
                    <div class="card" id="card3">
                        <div class="card-face card-back" id="back3"></div>
                        <div class="card-face card-front"><span class="text-4xl font-black" id="res3">?</span></div>
                    </div>
                </div>
                <div class="card-container" id="container4" onclick="selectCard(4)">
                    <div class="card" id="card4">
                        <div class="card-face card-back" id="back4"></div>
                        <div class="card-face card-front"><span class="text-4xl font-black" id="res4">?</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass p-5 rounded-2xl mb-6">
            <div class="flex justify-between mb-1">
                <span class="text-[12px] text-gray-400">BET AMOUNT</span>
                <span class="text-[12px] text-blue-400 font-bold" id="betDisplay">0.1 TON</span>
            </div>
            <input type="range" min="0.1" max="3.0" step="0.1" value="0.1" class="w-full mb-4 accent-blue-500" id="betRange" oninput="updateBet(this.value)">
            
            <div class="flex justify-between items-center bg-black/30 p-3 rounded-lg border border-blue-500/30 mb-4">
                <span class="text-[11px] text-gray-300 uppercase">Est. Payout (3.3x)</span>
                <span class="text-xl font-bold text-yellow-400" id="winDisplay">0.33 TON</span>
            </div>

            <button id="betBtn" class="w-full bg-blue-600 py-3 rounded-xl font-bold shadow-lg active:scale-95 disabled:opacity-50" onclick="handlePlay()">
                PLACE BET
            </button>
        </div>

        <div class="glass p-4 rounded-xl mb-10">
            <p class="text-xs font-bold text-gray-400 uppercase mb-3">Game History</p>
            <table>
                <thead>
                    <tr class="text-gray-500"><th>Time</th><th>Bet</th><th>Result</th></tr>
                </thead>
                <tbody id="historyBody">
                    <tr><td colspan="3" class="text-center py-4 text-gray-600">No records yet</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let selected = 0;
        let isGameState = "LOCKED";
        const gameAudio = new Audio("https://mcjkstdplhybfjjjtzyl.supabase.co/storage/v1/object/public/audio/sonican-powerful-epic-orchestral-45-seconds-330378.mp3");

        function enableAudio() {
            gameAudio.play().then(() => {
                gameAudio.pause();
                gameAudio.currentTime = 0;
                document.getElementById('audio-locker').style.display = 'none';
                isGameState = "IDLE";
            });
        }

        function updateBet(v) {
            document.getElementById('betDisplay').innerText = parseFloat(v).toFixed(1) + " TON";
            document.getElementById('winDisplay').innerText = (v * 3.3).toFixed(2) + " TON";
        }

        function selectCard(n) {
            if(isGameState !== "IDLE") return;
            selected = n;
            document.querySelectorAll('.card-back').forEach(f => f.classList.remove('selected-card'));
            document.getElementById('back' + n).classList.add('selected-card');
        }

        async function handlePlay() {
            if(selected === 0) return alert("Select a card first!");
            if(isGameState !== "IDLE") return;

            try {
                isGameState = "BETTING";
                gameAudio.play();
                document.getElementById('betBtn').innerText = "GAME STARTED...";
                document.getElementById('betBtn').disabled = true;
                
                // Shake cards
                document.querySelectorAll('.card').forEach(c => c.classList.add('animate-pulse'));
                
                setTimeout(() => revealFinal(), 3000); // 3 sec for demo
            } catch(e) { alert("Error starting game"); }
        }

        function revealFinal() {
            gameAudio.pause();
            document.querySelectorAll('.card').forEach(c => {
                c.classList.remove('animate-pulse');
                c.classList.add('revealed');
            });

            // Logic for History
            const betVal = document.getElementById('betDisplay').innerText;
            const history = document.getElementById('historyBody');
            const now = new Date().toLocaleTimeString();
            history.innerHTML = `<tr><td>${now}</td><td>${betVal}</td><td class="text-red-500">Lost</td></tr>` + history.innerHTML;

            setTimeout(() => {
                isGameState = "IDLE";
                document.getElementById('betBtn').disabled = false;
                document.getElementById('betBtn').innerText = "PLACE BET";
                document.querySelectorAll('.card').forEach(c => c.classList.remove('revealed'));
            }, 4000);
        }

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://ggg121314.github.io/Golden-Game-Global-/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });
    </script>
</body>
</html>
