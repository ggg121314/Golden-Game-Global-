<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGG QUAD-CARD LEGACY PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        body {
            background: radial-gradient(circle at center, #1a2a6c, #b21f1f, #fdbb2d); /* Cyberpunk vibes */
            background: #000814;
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            min-height: 100vh;
        }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .win-box { border-left: 4px solid #22c55e; }
        .ref-box { border-left: 4px solid #22c55e; }
        .withdraw-box { border-left: 4px solid #3b82f6; }

        /* Card Styling */
        .card-container { perspective: 1000px; width: 100%; aspect-ratio: 4/2.5; cursor: pointer; }
        .card {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card.revealed { transform: rotateX(180deg); }
        
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
        }

        .card-back {
            background: linear-gradient(45deg, #0d1b2a, #1b263b);
            background-image: url('https://i.ibb.co/BVb4wg2R/Screenshot-2026-04-30-14-09-16-915-com-google-android-googlequicksearchbox-edit.jpg');
            background-size: cover;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .card-front {
            background: #ffffff;
            transform: rotateX(180deg);
            color: #1a2a6c;
        }

        .selected-card { 
            border: 3px solid #fbbf24 !important;
            box-shadow: 0 0 20px #fbbf24;
            transform: translateY(-5px);
        }

        /* History Table */
        .history-row { font-family: 'Rajdhani', sans-serif; border-bottom: 1px solid rgba(255,255,255,0.05); }

        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        .pulse { animation: pulse-blue 2s infinite; }
    </style>
</head>
<body class="p-4 pb-20">

    <div class="max-w-md mx-auto flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">GGG QUAD</h1>
            <p class="text-[10px] tracking-widest text-gray-400">LEGACY EDITION</p>
        </div>
        <div class="flex flex-col items-end gap-2">
            <div id="ton-connect"></div>
            <button onclick="enableAudio()" id="soundBtn" class="text-[10px] bg-gray-800 px-3 py-1 rounded-full border border-gray-600 flex items-center gap-1">
                <span id="soundIcon">🔇</span> SOUND OFF
            </button>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <div class="grid grid-cols-3 gap-2 mb-6">
            <div class="glass win-box p-2 rounded-lg text-center">
                <p class="text-[9px] text-gray-400 font-bold uppercase">Pending</p>
                <p class="text-sm font-bold text-green-400" id="pending-win">0.00</p>
            </div>
            <div class="glass ref-box p-2 rounded-lg text-center">
                <p class="text-[9px] text-gray-400 font-bold uppercase">Referral</p>
                <p class="text-sm font-bold text-green-400" id="ref-balance">0.00</p>
            </div>
            <div class="glass withdraw-box p-2 rounded-lg text-center cursor-pointer active:scale-95 transition-all">
                <p class="text-[9px] text-gray-400 font-bold uppercase">Withdraw</p>
                <p class="text-sm font-bold text-blue-400">ALL</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8" id="gameBoard">
            <div class="card-container" onclick="selectCard(1)">
                <div class="card" id="card1">
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front"><span class="text-4xl font-bold" id="res1">?</span></div>
                </div>
            </div>
            <div class="card-container" onclick="selectCard(2)">
                <div class="card" id="card2">
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front"><span class="text-4xl font-bold" id="res2">?</span></div>
                </div>
            </div>
            <div class="card-container" onclick="selectCard(3)">
                <div class="card" id="card3">
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front"><span class="text-4xl font-bold" id="res3">?</span></div>
                </div>
            </div>
            <div class="card-container" onclick="selectCard(4)">
                <div class="card" id="card4">
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front"><span class="text-4xl font-bold" id="res4">?</span></div>
                </div>
            </div>
        </div>

        <div class="glass p-6 rounded-3xl shadow-2xl relative overflow-hidden">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <span class="text-[10px] text-gray-400 block mb-1">SELECT AMOUNT</span>
                    <span class="text-2xl font-bold text-blue-400" id="betDisplay">0.1</span> <span class="text-sm text-gray-500">TON</span>
                </div>
                <div class="text-right">
                    <span class="text-[10px] text-gray-400 block mb-1">EST. PAYOUT (3.3x)</span>
                    <span class="text-2xl font-bold text-emerald-400" id="payoutDisplay">0.33</span> <span class="text-sm text-gray-500">TON</span>
                </div>
            </div>
            
            <input type="range" min="0.1" max="3.0" step="0.1" value="0.1" 
                   class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-500 mb-8" 
                   id="betRange" oninput="updateBet(this.value)">
            
            <div id="timerDisplay" class="text-center text-yellow-400 font-bold mb-4 hidden">
                <span class="text-[10px] block uppercase tracking-widest">Revealing Cards</span>
                <span id="seconds" class="text-4xl font-black">45</span><span class="text-sm ml-1 text-gray-500">s</span>
            </div>

            <button id="betBtn" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 py-4 rounded-2xl font-black text-lg shadow-xl transition-all active:scale-95 disabled:opacity-50 disabled:grayscale pulse" onclick="handlePlay()">
                PLACE BET (3.3x)
            </button>
        </div>

        <div class="mt-10">
            <h3 class="text-sm font-bold text-gray-500 mb-4 tracking-widest uppercase">Recent Game History</h3>
            <div class="glass rounded-2xl overflow-hidden">
                <table class="w-full text-left text-xs">
                    <thead class="bg-white/5 text-gray-400">
                        <tr>
                            <th class="p-3">Player</th>
                            <th class="p-3">Bet</th>
                            <th class="p-3">Card</th>
                            <th class="p-3">Result</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr class="history-row">
                            <td class="p-3 text-gray-300">UQBy...3a9</td>
                            <td class="p-3 font-bold">1.5 TON</td>
                            <td class="p-3">#3</td>
                            <td class="p-3 text-emerald-400 font-bold">+4.95 TON</td>
                        </tr>
                        <tr class="history-row">
                            <td class="p-3 text-gray-300">UQD1...f2e</td>
                            <td class="p-3 font-bold">0.5 TON</td>
                            <td class="p-3">#1</td>
                            <td class="p-3 text-rose-400 font-bold">0.00 TON</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let selected = 0;
        let isGameState = "IDLE";
        const gameAudio = new Audio("https://mcjkstdplhybfjjjtzyl.supabase.co/storage/v1/object/public/audio/sonican-powerful-epic-orchestral-45-seconds-330378.mp3");

        function enableAudio() {
            gameAudio.play().then(() => {
                gameAudio.pause();
                gameAudio.currentTime = 0;
                document.getElementById('soundBtn').classList.replace('bg-gray-800', 'bg-blue-600');
                document.getElementById('soundIcon').innerText = '🔊';
                document.getElementById('soundBtn').innerHTML = '🔊 SOUND ON';
            }).catch(e => console.log("Audio Init Failed"));
        }

        function selectCard(n) {
            if(isGameState === "BETTING") return;
            selected = n;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected-card'));
            document.getElementById('card' + n).classList.add('selected-card');
            
            // Sound effect on select
            const selectSfx = new Audio("https://www.soundjay.com/buttons/button-16.mp3");
            selectSfx.volume = 0.3;
            selectSfx.play().catch(()=>{});
        }

        function updateBet(v) {
            const val = parseFloat(v).toFixed(1);
            document.getElementById('betDisplay').innerText = val;
            const payout = (val * 3.3).toFixed(2);
            document.getElementById('payoutDisplay').innerText = payout;
        }

        async function handlePlay() {
            if(selected === 0) return alert("Please select a card first!");
            if(isGameState === "BETTING") return;

            // Start Audio
            gameAudio.currentTime = 0;
            gameAudio.play().catch(e => console.log("User must click Sound ON first"));

            isGameState = "BETTING";
            const btn = document.getElementById('betBtn');
            btn.disabled = true;
            btn.classList.remove('pulse');
            btn.innerText = "WAITING FOR CONTRACT...";

            // Simulate Game Start
            setTimeout(() => {
                btn.innerText = "GAME IN PROGRESS";
                startGame();
            }, 1500);
        }

        function startGame() {
            document.querySelectorAll('.card').forEach(c => {
                c.classList.remove('revealed');
                c.style.animation = "shake 0.2s infinite";
            });

            document.getElementById('timerDisplay').classList.remove('hidden');
            let timer = 45;
            const countdown = setInterval(() => {
                timer--;
                document.getElementById('seconds').innerText = timer;
                if(timer <= 0) {
                    clearInterval(countdown);
                    revealFinal();
                }
            }, 1000);
        }

        function revealFinal() {
            gameAudio.pause();
            isGameState = "REVEALED";
            document.querySelectorAll('.card').forEach(c => {
                c.style.animation = "none";
                c.classList.add('revealed');
            });

            // Random Result
            const winCard = Math.floor(Math.random() * 4) + 1;
            const mockResults = [1, 5, 9, 12]; // Just for UI
            
            document.querySelectorAll('.result-val').forEach((el, i) => {
                el.innerText = mockResults[i];
            });

            setTimeout(() => {
                resetGame();
            }, 5000);
        }

        function resetGame() {
            isGameState = "IDLE";
            const btn = document.getElementById('betBtn');
            btn.disabled = false;
            btn.classList.add('pulse');
            btn.innerText = "PLACE BET (3.3x)";
            document.getElementById('timerDisplay').classList.add('hidden');
            document.querySelectorAll('.card').forEach(c => {
                c.classList.remove('revealed', 'selected-card');
            });
            selected = 0;
        }

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://ggg121314.github.io/Golden-Game-Global-/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });
    </script>

    <style>
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }
    </style>
</body>
</html>
